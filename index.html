<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胸部・乳房画像診断学 正誤クイズ</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f4f7f6; color: #333; line-height: 1.6; padding: 20px; max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .quiz-container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .name-container { background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        .name-input { padding: 10px; font-size: 1.1em; width: 60%; max-width: 300px; border: 2px solid #bdc3c7; border-radius: 4px; margin-right: 10px; }
        .start-btn { padding: 10px 20px; font-size: 1.1em; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .question-box { display: none; }
        .question-box.active { display: block; }
        .question-number { font-size: 0.9em; color: #95a5a6; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .question-text { font-size: 1.2em; font-weight: bold; margin-bottom: 20px; }
        .btn-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .btn { flex: 1; padding: 15px; font-size: 1.1em; border: none; border-radius: 5px; cursor: pointer; transition: background 0.2s; font-weight: bold; }
        .btn-true { background-color: #3498db; color: white; }
        .btn-true:hover { background-color: #2980b9; }
        .btn-false { background-color: #e74c3c; color: white; }
        .btn-false:hover { background-color: #c0392b; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; }
        .result-box.correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .result-box.incorrect { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .next-btn { display: none; margin-top: 20px; padding: 10px 25px; background-color: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em; float: right; }
        .status-message { text-align: center; font-weight: bold; color: #7f8c8d; margin-top: 15px; font-size: 1.1em; }
        .clear { clear: both; }
    </style>
</head>
<body>

    <h1>胸部・乳房画像診断学 正誤クイズ</h1>

    <div class="name-container" id="name-screen">
        <h3>解答を記録するため、名前を入力してください</h3>
        <input type="text" id="username-field" class="name-input" placeholder="例：山田 太郎">
        <button class="start-btn" onclick="startQuiz()">クイズ開始</button>
    </div>

    <div class="quiz-container" id="quiz-container" style="display: none;"></div>
    
    <div id="status" class="status-message"></div>

    <script>
        // 送信先の「結果2」に紐づいたGASウェブアプリURL
        const gasWebAppUrl = "https://script.google.com/macros/s/AKfycby5873BbKHlswjBamgHeH_yaRkQETrLhiivaove3G3tHHvViXNQdDEGD6Grf4rdQ7fH/exec";

        // クイズデータ（全24問）
        const quizData = [
            { no: 1, q: "珪肺の特徴的なX線所見として肺門リンパ節周囲の卵殻状石灰沈着が認められる。", a: "○", note: "珪肺（けいはい）では、肺門リンパ節の周囲に殻のような「卵殻状石灰沈着」が見られるのが非常に特徴的です。" },
            { no: 2, q: "石綿肺では胸膜プラークといった胸膜変化が見られるのが特徴で石灰化頻度も高い。", a: "○", note: "アスベスト（石綿）吸入による石綿肺では、胸膜プラークやその石灰化が高頻度で見られます。" },
            { no: 3, q: "サルコイドーシスは胸部X線写真で両側肺門部リンパ節腫大が特徴적所見である。", a: "○", note: "両側肺門部リンパ節腫大（BHL）はサルコイドーシスの最も典型的な胸部X線所見です。" },
            { no: 4, q: "肺胞性肺水腫ではカーリーラインが認められるようになる。", a: "×", note: "カーリーライン（Kerley's line）は「間質性」肺水腫で見られる所見です。" },
            { no: 5, q: "間質性肺水腫ではバタフライシャドウが認められるようになる。", a: "×", note: "バタフライシャドウ（蝶形陰影）は「肺胞性」肺水腫で認められる特徴的な所見です。" },
            { no: 6, q: "胸部側面像において古典的縦隔区分では3区域に、Felsonによる縦隔区分では4区域に区分される。", a: "×", note: "逆です。古典的区分が4区域、Felsonによる縦隔区分が3区域（前・中・後）に区分されます。" },
            { no: 7, q: "胸部領域においてプロトンを持たない肺はMRIの苦手な分野であり、縦隔、心臓、大血管がMRI検査の対象部位となる。", a: "○", note: "肺野は空気粒子が多くプロトン（水素原子核）が少ないためMRIは苦手ですが、縦隔や大血管には非常に有用です。" },
            { no: 8, q: "胸腺は胸骨の後ろにある臓器で胸腺癌は40〜70歳に、胸腺腫は幅広い年齢で生じる。", a: "×", note: "逆です。胸腺腫が40〜70歳の中高年に好発し、胸腺癌が幅広い年齢層で生じます。" },
            { no: 9, q: "中縦隔に好発する腫瘍に神経原性腫瘍がある。", a: "×", note: "神経原性腫瘍は「後縦隔」に最も好発する腫瘍です。" },
            { no: 10, q: "Fallot四徴症とは肺動脈狭窄、心房中隔欠損、大動脈騎乗、右房肥大の4徴候を指す。", a: "×", note: "Fallot（ファロー）四徴症は「肺動脈狭窄」「心室中隔欠損」「大動脈騎乗」「右室肥大」の4つです。" },
            { no: 11, q: "胸部X線写真における大動脈解離の所見に6mm以上の内膜石灰化の偏位があげられる。", a: "○", note: "大動脈壁の石灰化が外側の縁から6mm以上内側にズレている（偏位している）所見は、大動脈解離を示唆します。" },
            { no: 12, q: "大動脈解離のタイプには上行大動脈に解離のないスタンフォードA型と、上行大動脈に解離のあるスタンフォードB型がある。", a: "×", note: "逆です。上行大動脈に解離があるのがA型、ないのがB型です。" },
            { no: 13, q: "乳房X線検査では左右の乳房に対して内外斜位方向と頭尾方向の2方向撮影が標準撮影法となる。", a: "○", note: "マンモグラフィーでは、MLO（内外斜位方向）とCC（頭尾方向）の2方向撮影が基本の標準撮影です。" },
            { no: 14, q: "乳房超音波検査は乳房X線撮影で評価困難な乳房に対しても有用であり有症状者すべてに適応がある検査である。", a: "○", note: "高濃度乳房など、X線（マンモ）で白く写ってしまい評価が難しい乳房に対しても超音波検査は非常に有用です。" },
            { no: 15, q: "乳房の構造において乳腺実質は20〜40個の乳腺葉からなり、各乳腺葉は10〜20個の小葉から構成されている。", a: "×", note: "数字が逆です。10〜20個の乳腺葉と、20〜40個の小葉から構成されています。" },
            { no: 16, q: "日本の乳がんマンモグラフィー検査における要精査基準はカテゴリー4以上である。", a: "×", note: "要精査（精密検査が必要）の基準は「カテゴリー3以上」からとなっています。" },
            { no: 17, q: "マンモグラフィーにおいて微細線状・分枝状石灰化陰影とは乳管内を進展している乳がんによる石灰化である。", a: "○", note: "微細線状や分枝状に連なる石灰化は、悪性（乳がん）を最も強く疑う非常に重要な所見です。" },
            { no: 18, q: "マンモグラフィーにおいて乳管腺葉系に一致した石灰化は良性の可能性が高い。", a: "×", note: "乳管の走行（乳管腺葉系）に一致して分布する石灰化は、「悪性（乳がん）」の可能性が高くなります。" },
            { no: 19, q: "マンモグラフィーにおける腫瘤陰影において不整形な形状のものほど悪性度が高くなる。", a: "○", note: "丸や楕円などの整った形に比べ、不整形やギザギザ（スピキュラ）があるものほど悪性（がん）の確率が高くなります。" },
            { no: 20, q: "マンモグラフィーにおける腫瘤陰影において内部濃度が高いものほど悪性度が高くなる。", a: "○", note: "がんは細胞が密に増殖するためX線を遮りやすく、マンモグラフィーで「高濃度（真っ白）」に写る傾向があります。" },
            { no: 21, q: "乳房超音波像において腫瘤内部エコーのうち点状エコーは乳がんの30〜40%に認められ、石灰化巣に相当する所見である。", a: "○", note: "超音波映像の中に見られる微細な点状の高輝度エコーは、がん細胞に伴う微小石灰化を反映しています。" },
            { no: 22, q: "乳房超音波像において腫瘤の縦横比基準は0.7で、0.7より大きいものを良性、0.7以下が悪性と考える。", a: "×", note: "逆です。縦に伸びる形状（縦横比0.7より大きい）ものが「悪性」、横に平べったい（0.7以下）ものが「良性」の指標です。" },
            { no: 23, q: "乳がんの60%は乳管にできる乳管がんと呼ばれるもので、小葉にできる小葉がんは40%程度とされている。", a: "×", note: "割合が異なります。乳管がんが約90%、小葉がんは約10%程度を占めます。" },
            { no: 24, q: "乳房区分の内最も乳がんが発生しやすい部位はD (外側下部) 領域である。", a: "×", note: "最も乳がんが発生しやすいのは、乳腺組織が一番豊富な「C領域（外側上部・脇側の上側）」です。" }
        ];

        let currentQuestionIndex = 0;
        let savedUserName = "";

        const nameScreen = document.getElementById('name-screen');
        const container = document.getElementById('quiz-container');
        const statusDiv = document.getElementById('status');

        function startQuiz() {
            const inputName = document.getElementById('username-field').value.trim();
            if (!inputName) {
                alert("名前を入力してください。");
                return;
            }
            savedUserName = inputName;
            nameScreen.style.display = "none";
            container.style.display = "block";
            renderQuestion();
        }

        function renderQuestion() {
            if (currentQuestionIndex >= quizData.length) {
                container.innerHTML = "<h2>すべてのクイズ（全24問）が終了しました！お疲れ様でした。</h2>";
                return;
            }
            const currentQuiz = quizData[currentQuestionIndex];
            container.innerHTML = `
                <div class="question-box active">
                    <div class="question-number">Question ${currentQuestionIndex + 1} of ${quizData.length} (解答者: ${savedUserName})</div>
                    <div class="question-text">${currentQuiz.q}</div>
                    <div class="btn-container">
                        <button class="btn btn-true" onclick="submitAnswer('○')">○（正しい）</button>
                        <button class="btn btn-false" onclick="submitAnswer('×')">×（誤り）</button>
                    </div>
                    <div id="result" class="result-box"></div>
                    <button id="next-btn" class="next-btn" onclick="nextQuestion()">次の問題へ</button>
                    <div class="clear"></div>
                </div>
            `;
        }

        function submitAnswer(userChoice) {
            const buttons = container.querySelectorAll('.btn');
            buttons.forEach(btn => btn.disabled = true);

            const currentQuiz = quizData[currentQuestionIndex];
            const isCorrect = (userChoice === currentQuiz.a);
            
            const resultBox = document.getElementById('result');
            if (isCorrect) {
                resultBox.className = "result-box correct";
                resultBox.innerHTML = `<strong>正解！</strong><br>${currentQuiz.note}`;
            } else {
                resultBox.className = "result-box incorrect";
                resultBox.innerHTML = `<strong>不正解...（正解は ${currentQuiz.a}）</strong><br>${currentQuiz.note}`;
            }
            resultBox.style.display = "block";
            document.getElementById('next-btn').style.display = "block";

            sendToGoogleSheets(currentQuiz.no, userChoice, isCorrect);
        }

        function sendToGoogleSheets(qNum, answer, isCorrect) {
            statusDiv.style.color = "#7f8c8d";
            statusDiv.innerText = "データをスプレッドシート「結果2」に送信中...";

            const payload = {
                userName: savedUserName,
                questionNumber: qNum,
                userAnswer: answer,
                isCorrect: isCorrect
            };

            fetch(gasWebAppUrl, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === "success") {
                    statusDiv.style.color = "#2ecc71";
                    statusDiv.innerText = "「結果2」へのデータ自動保存に成功しました！";
                } else {
                    statusDiv.style.color = "#e74c3c";
                    statusDiv.innerText = "GAS内部エラー: " + data.message;
                }
            })
            .catch(error => {
                statusDiv.style.color = "#e74c3c";
                statusDiv.innerText = "通信エラーが起きました。もう一度試すか、リフレッシュしてください。";
                console.error("Error:", error);
            });
        }

        function nextQuestion() {
            currentQuestionIndex++;
            statusDiv.innerText = "";
            renderQuestion();
        }
    </script>
</body>
</html>
