<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>胸部・乳房画像診断学 正誤クイズ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .quiz-container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .question-box {
            display: none; /* 最初は非表示、JSで1問ずつ制御 */
        }
        .question-box.active {
            display: block;
        }
        .question-number {
            font-size: 0.9em;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .btn-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .btn {
            flex: 1;
            padding: 15px;
            font-size: 1.1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: bold;
        }
        .btn-true { background-color: #3498db; color: white; }
        .btn-true:hover { background-color: #2980b9; }
        .btn-false { background-color: #e74c3c; color: white; }
        .btn-false:hover { background-color: #c0392b; }
        
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .result-box.correct { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .result-box.incorrect { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        .next-btn {
            display: none;
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            float: right;
        }
        .next-btn:hover { background-color: #27ae60; }
        
        .status-message {
            text-align: center;
            font-weight: bold;
            color: #7f8c8d;
            margin-top: 15px;
        }
        .clear { clear: both; }
    </style>
</head>
<body>

    <h1>胸部・乳房画像診断学 正誤クイズ</h1>

    <div class="quiz-container" id="quiz-container">
        </div>
    
    <div id="status" class="status-message"></div>

    <script>
        // 提供されたGASのWebアプリURL
        const gasWebAppUrl = "https://script.google.com/macros/s/AKfycbwB8i4dd61nqh-cAIiu3SDdiv0u7tzYK1oM0f-ujXjSMW0zJ_cvYsnsZq_cox21Welc5Q/exec";

        // クイズデータ（PDFの内容をベースに作成）
        const quizData = [
            { no: 1, q: "珪肺の特徴的なX線所見として、肺門リンパ節周囲の卵殻状石灰沈着が認められる。", a: "○", note: "肺門リンパ節周囲の卵殻状石灰沈着（eggshell calcification）は、珪肺に非常に特徴的な所見です。" },
            { no: 2, q: "肺胞性肺水腫では、胸部X線写真でカーリーライン（Kerley's line）が認められるようになる。", a: "×", note: "カーリーラインは「間質性」肺水腫で見られる所見です。肺胞性ではバタフライシャドウが特徴です。" },
            { no: 3, q: "Felsonによる縦隔区分において、縦隔は3区域に区分される。", a: "○", note: "Felsonの区分法では前・中・後の3区域に分けられます（古典的区分は4区域）。" },
            { no: 4, q: "胸腺腫は40～70歳に多く生じ、胸腺癌は幅広い年齢層で生じる傾向がある。", a: "○", note: "胸腺腫は40〜70歳に好発し、胸腺癌は幅広い年齢で発生します。" },
            { no: 5, q: "神経原性腫瘍は、中縦隔に最も好発する腫瘍である。", a: "×", note: "神経原性腫瘍は「後縦隔」に好発する代表的な腫瘍です。" },
            { no: 6, q: "Fallot四徴症とは、肺動脈狭窄、心房中隔欠損、大動脈騎乗、右室肥大の4徴候を指す。", a: "×", note: "心房中隔欠損ではなく、「心室中隔欠損」の4徴候です。" },
            { no: 7, q: "大動脈解離のスタンフォード分類において、上行大動脈に解離がないものはB型に分類される。", a: "○", note: "上行大動脈に解離があるのがA型、ないのがB型です。" },
            { no: 8, q: "日本の乳がんマンモグラフィー検診における要精査の判定基準は、カテゴリー4以上である。", a: "×", note: "要精査基準は「カテゴリー3以上」からとなっています。" },
            { no: 9, q: "マンモグラフィーの腫瘤陰影において、内部濃度が高いものほど悪性度が高くなる傾向がある。", a: "○", note: "内部濃度（密度）が高いものほど悪性度（がんの可能性）が高くなります。" },
            { no: 10, q: "乳房を4つの区域に分けたとき、最も乳がんが発生しやすい部位はD（外側下部）領域である。", a: "×", note: "最も発生しやすいのは「C（外側上部）」領域です。" }
        ];

        let currentQuestionIndex = 0;

        const container = document.getElementById('quiz-container');
        const statusDiv = document.getElementById('status');

        // クイズ画面を表示する関数
        function renderQuestion() {
            if (currentQuestionIndex >= quizData.length) {
                container.innerHTML = "<h2>すべてのクイズが終了しました！お疲れ様でした。</h2>";
                return;
            }

            const currentQuiz = quizData[currentQuestionIndex];
            
            container.innerHTML = `
                <div class="question-box active">
                    <div class="question-number">Question ${currentQuestionIndex + 1} of ${quizData.length}</div>
                    <div class="question-text">${currentQuiz.q}</div>
                    <div class="btn-container">
                        <button class="btn btn-true" onclick="submitAnswer('○')">○（正しい）</button>
                        <button class="btn btn-false" onclick="submitAnswer('×')">×（誤り）</button>
                    </div>
                    <div id="result" class="result-box"></div>
                    <button id="next-btn" class="next-btn" onclick="nextQuestion()">次の問題へ</button>
                    <div class="clear"></div>
                </div>
            `;
        }

        // 回答を判定してGASに送る関数
        function submitAnswer(userChoice) {
            // ボタンを無効化して連打を防ぐ
            const buttons = container.querySelectorAll('.btn');
            buttons.forEach(btn => btn.disabled = true);

            const currentQuiz = quizData[currentQuestionIndex];
            const isCorrect = (userChoice === currentQuiz.a);
            
            // 結果画面の表示
            const resultBox = document.getElementById('result');
            if (isCorrect) {
                resultBox.className = "result-box correct";
                resultBox.innerHTML = `<strong>正解！</strong><br>${currentQuiz.note}`;
            } else {
                resultBox.className = "result-box incorrect";
                resultBox.innerHTML = `<strong>不正解...（正解は ${currentQuiz.a}）</strong><br>${currentQuiz.note}`;
            }
            resultBox.style.display = "block";
            document.getElementById('next-btn').style.display = "block";

            // GASへデータを送信
            sendToGoogleSheets(currentQuiz.no, userChoice, isCorrect);
        }

        // GAS（Google Sheets）へ通信する処理
        function sendToGoogleSheets(qNum, answer, isCorrect) {
            statusDiv.innerText = "データをスプレッドシートに送信中...";

            const payload = {
                questionNumber: qNum,
                userAnswer: answer,
                isCorrect: isCorrect
            };

            fetch(gasWebAppUrl, {
                method: "POST",
                mode: "cors",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === "success") {
                    statusDiv.innerText = "スプレッドシートへの保存に成功しました！";
                } else {
                    statusDiv.innerText = "GAS側でエラーが発生しました。";
                    console.error(data.message);
                }
            })
            .catch(error => {
                statusDiv.innerText = "通信エラーが発生しました。";
                console.error("Error:", error);
            });
        }

        // 次の問題に進む処理
        function nextQuestion() {
            currentQuestionIndex++;
            statusDiv.innerText = "";
            renderQuestion();
        }

        // 最初の問題を表示
        renderQuestion();
    </script>
</body>
</html>
